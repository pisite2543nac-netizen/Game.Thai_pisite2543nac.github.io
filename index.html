<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศึกชิงบัลลังก์ - เกมต่อสู้ 2 ผู้เล่น</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================
   ส่วนที่ 1: CSS Variables และ Base Styles
   - กำหนดสีพื้นฐานของทั้งเกม
   - ใช้ --accent เป็นสีทองเข้ม ไม่ใช่น้ำเงิน/ม่วง
   ============================================ */
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --fg: #f0e8d8;
  --muted: #6b6358;
  --accent: #d4a017;
  --accent2: #f5c842;
  --card: #1a1a25;
  --border: #2a2a38;
  --fire: #ff4400;
  --fire-light: #ff8800;
  --ice: #00bbff;
  --ice-light: #88ddff;
  --thunder: #ffcc00;
  --thunder-light: #ffee66;
  --nature: #00cc44;
  --nature-light: #66ff99;
  --shadow: #aa44ff;
  --shadow-light: #cc88ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Prompt', sans-serif;
  background: var(--bg);
  color: var(--fg);
  overflow-x: hidden;
  min-height: 100vh;
}
/* ปิดการเลือกข้อความระหว่างเล่นเกม */
.game-screen { display:none; flex-direction:column; align-items:center; min-height:100vh; }
.game-screen.active { display:flex; }

/* ============================================
   ส่วนที่ 2: Canvas สำหรับเอฟเฟค
   - วางทับหน้าจอทั้งหมด
   - pointer-events:none ให้คลิกทะลุไปได้
   ============================================ */
#fx-canvas {
  position:fixed; inset:0;
  pointer-events:none; z-index:500;
}

/* ============================================
   ส่วนที่ 3: หน้าจอชื่อเกม (Title Screen)
   - พื้นหลังเคลื่อนไหวด้วย gradient animation
   - ชื่อเกมใหญ่โตพร้อมเงาเรืองแสง
   ============================================ */
#screen-title {
  justify-content:center; gap:2rem;
  background: radial-gradient(ellipse at 50% 80%, #1a0f00 0%, var(--bg) 70%);
  position: relative; overflow:hidden;
}
#screen-title::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at 30% 60%, rgba(212,160,23,0.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 40%, rgba(255,68,0,0.06) 0%, transparent 50%);
  animation: bg-pulse 4s ease-in-out infinite alternate;
}
@keyframes bg-pulse {
  0%{opacity:0.5;transform:scale(1)} 100%{opacity:1;transform:scale(1.1)}
}
.title-main {
  font-size: clamp(2.5rem,8vw,5rem);
  font-weight:900;
  background: linear-gradient(135deg, var(--accent), var(--accent2), #fff, var(--accent));
  background-size:300% 300%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation: title-shimmer 3s ease-in-out infinite;
  text-align:center; line-height:1.2;
  filter: drop-shadow(0 0 30px rgba(212,160,23,0.3));
}
@keyframes title-shimmer {
  0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}
.title-sub {
  font-size: clamp(0.9rem,2.5vw,1.3rem);
  color: var(--muted); font-weight:400;
  text-align:center; letter-spacing:0.15em;
}
.btn-start {
  padding:1rem 3rem; font-size:1.3rem; font-weight:700;
  background: linear-gradient(135deg, var(--accent), #b8860b);
  color:#0a0a0f; border:none; border-radius:50px;
  cursor:pointer; position:relative; overflow:hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  font-family:'Prompt',sans-serif;
}
.btn-start:hover {
  transform:scale(1.05);
  box-shadow: 0 0 40px rgba(212,160,23,0.5);
}
.btn-start::after {
  content:''; position:absolute; top:-50%; left:-50%;
  width:200%; height:200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
  animation: btn-shine 2.5s ease-in-out infinite;
}
@keyframes btn-shine {
  0%{transform:translateX(-100%) rotate(45deg)} 100%{transform:translateX(100%) rotate(45deg)}
}

/* ============================================
   ส่วนที่ 4: หน้าจอเลือกตัวละคร (Character Select)
   - แสดงการ์ด 5 ใบเรียงกัน
   - การ์ดมี hover effect และสถานะเลือก
   ============================================ */
#screen-select { padding:1.5rem; gap:1rem; }
.select-header {
  font-size:clamp(1.2rem,3vw,1.8rem); font-weight:700;
  color: var(--accent); text-align:center;
}
.char-grid {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
  gap:1rem; width:100%; max-width:1000px;
}
.char-card {
  background: var(--card); border:2px solid var(--border);
  border-radius:16px; padding:1.2rem; cursor:pointer;
  transition: all 0.3s ease; position:relative; overflow:hidden;
  text-align:center;
}
.char-card:hover:not(.disabled) {
  transform:translateY(-8px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.char-card.disabled {
  opacity:0.35; cursor:not-allowed; pointer-events:none;
}
.char-card.p1-selected { border-color:#00aaff; box-shadow:0 0 25px rgba(0,170,255,0.4); }
.char-card.p2-selected { border-color:#ff4466; box-shadow:0 0 25px rgba(255,68,102,0.4); }
.char-card .char-icon {
  width:80px; height:80px; border-radius:50%; margin:0 auto 0.8rem;
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; color:#fff; position:relative;
}
.char-card .char-icon::after {
  content:''; position:absolute; inset:-6px;
  border-radius:50%; opacity:0.4;
  animation: aura-pulse 2s ease-in-out infinite;
}
@keyframes aura-pulse { 0%,100%{transform:scale(1);opacity:0.3} 50%{transform:scale(1.15);opacity:0.5} }
.char-card .char-name { font-weight:800; font-size:1.1rem; margin-bottom:0.2rem; }
.char-card .char-title { font-size:0.75rem; color:var(--muted); margin-bottom:0.8rem; }
.stat-row { display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:0.3rem; }
.stat-bar { width:60%; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.stat-fill { height:100%; border-radius:3px; transition:width 0.3s; }
.char-card .select-badge {
  position:absolute; top:8px; right:8px;
  padding:2px 10px; border-radius:20px;
  font-size:0.7rem; font-weight:700; color:#fff;
  display:none;
}
.char-card.p1-selected .select-badge,
.char-card.p2-selected .select-badge { display:block; }
.btn-fight {
  padding:0.8rem 3rem; font-size:1.1rem; font-weight:700;
  background:linear-gradient(135deg, #cc0000, #ff2244);
  color:#fff; border:none; border-radius:50px;
  cursor:pointer; transition:all 0.3s;
  font-family:'Prompt',sans-serif; display:none;
}
.btn-fight.show { display:block; animation:pop-in 0.3s ease; }
@keyframes pop-in { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }

/* ============================================
   ส่วนที่ 5: หน้าจอต่อสู้ (Battle Screen)
   - โครงสร้างหลัก: 2 ฝั่ง + แผงสกิล + บันทึก
   ============================================ */
#screen-battle {
  padding:0.5rem; gap:0; position:relative;
  background: radial-gradient(ellipse at 50% 100%, #1a0f00 0%, var(--bg) 60%);
}
.battle-arena {
  display:flex; width:100%; max-width:1100px;
  justify-content:space-between; align-items:flex-start;
  gap:0.5rem; position:relative;
}
/* แถบข้อมูลผู้เล่นแต่ละฝั่ง */
.player-side {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:0.5rem; position:relative;
  min-width:0;
}
.player-label {
  font-size:0.8rem; font-weight:700; padding:2px 16px;
  border-radius:20px; letter-spacing:0.05em;
}
.p1-label { background:rgba(0,170,255,0.2); color:#00aaff; }
.p2-label { background:rgba(255,68,102,0.2); color:#ff4466; }
/* ตัวละครในสนาม */
.battle-char {
  width:clamp(100px,18vw,160px); height:clamp(130px,24vw,210px);
  position:relative; transition:transform 0.1s;
}
.battle-char .char-body {
  width:100%; height:100%; border-radius:35% 35% 45% 45%;
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.battle-char .char-body i { font-size:clamp(2.5rem,6vw,4.5rem); color:#fff; position:relative; z-index:2; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
.battle-char .char-body::before {
  content:''; position:absolute; inset:0;
  background:inherit; filter:brightness(0.6);
  z-index:1;
}
.battle-char .aura-ring {
  position:absolute; inset:-15px; border-radius:50%;
  border:2px solid; opacity:0.3;
  animation: aura-pulse 2.5s ease-in-out infinite;
}
/* HP Bar */
.hp-container { width:100%; max-width:180px; }
.hp-label { display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:2px; }
.hp-bar-outer {
  width:100%; height:14px; background:#1a1a1a;
  border-radius:7px; overflow:hidden; border:1px solid var(--border);
  position:relative;
}
.hp-bar-inner {
  height:100%; border-radius:7px;
  transition: width 0.6s ease, background 0.6s;
  position:relative;
}
.hp-bar-inner::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 60%);
  border-radius:7px;
}
/* แถบชาร์จอัลติเมท */
.ult-bar-outer {
  width:100%; max-width:180px; height:8px;
  background:#1a1a1a; border-radius:4px;
  overflow:hidden; border:1px solid var(--border);
  margin-top:4px;
}
.ult-bar-inner {
  height:100%; border-radius:4px;
  transition: width 0.4s ease;
  position:relative;
}
.ult-label { font-size:0.6rem; color:var(--muted); margin-top:2px; text-align:center; }
/* Status Effects */
.status-icons { display:flex; gap:4px; min-height:22px; flex-wrap:wrap; justify-content:center; }
.status-icon {
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.55rem; color:#fff; position:relative;
  animation: status-bounce 1s ease-in-out infinite;
}
.status-icon .turns-left {
  position:absolute; bottom:-2px; right:-2px;
  font-size:0.45rem; background:#000; color:#fff;
  width:12px; height:12px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}
@keyframes status-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

/* แผงตรงกลาง - แสดงเทิร์น */
.battle-center {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-width:100px; padding:1rem 0;
}
.turn-indicator {
  font-size:clamp(0.7rem,2vw,0.95rem); font-weight:700;
  color:var(--accent); text-align:center;
  padding:6px 16px; border:1px solid var(--accent);
  border-radius:20px; background:rgba(212,160,23,0.08);
}
/* บันทึกการต่อสู้ */
.battle-log {
  width:100%; max-width:1100px; height:80px; overflow-y:auto;
  background:rgba(0,0,0,0.4); border-radius:12px;
  padding:0.5rem 1rem; margin-top:0.5rem;
  border:1px solid var(--border);
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.battle-log::-webkit-scrollbar { width:4px; }
.battle-log::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.log-entry { font-size:0.72rem; padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.03); line-height:1.4; }
.log-entry:last-child { border-bottom:none; }
.log-p1 { color:#00aaff; }
.log-p2 { color:#ff4466; }
.log-system { color:var(--accent); font-weight:600; }
.log-funny { color:#ffcc00; font-style:italic; }

/* ============================================
   ส่วนที่ 6: แผงสกิล (Skill Panel)
   - 5 ปุ่มสกิล เรียงเป็น 2 แถว
   - สกิลที่ CD จะมี overlay มืด
   - อัลติเมทจะล็อกถ้าชาร์จไม่ถึง 100
   ============================================ */
.skill-panel {
  width:100%; max-width:1100px;
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:0.5rem; margin-top:0.5rem;
}
.skill-btn {
  padding:0.6rem 0.5rem; border-radius:12px;
  border:2px solid var(--border); background:var(--card);
  cursor:pointer; transition:all 0.2s;
  font-family:'Prompt',sans-serif; text-align:left;
  position:relative; overflow:hidden;
}
.skill-btn:hover:not(.on-cd):not(.locked) {
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}
.skill-btn:active:not(.on-cd):not(.locked) { transform:scale(0.97); }
.skill-btn.on-cd { opacity:0.4; cursor:not-allowed; }
.skill-btn.locked { opacity:0.3; cursor:not-allowed; }
.skill-btn .skill-name { font-size:0.8rem; font-weight:700; }
.skill-btn .skill-desc { font-size:0.6rem; color:var(--muted); margin-top:2px; }
.skill-btn .skill-quote { font-size:0.55rem; color:var(--accent); margin-top:2px; font-style:italic; }
.skill-btn .cd-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; font-weight:900; color:var(--muted);
}
.skill-btn.ult-btn { border-width:3px; }
.skill-btn.ult-btn:not(.locked) { animation: ult-glow 1.5s ease-in-out infinite alternate; }
@keyframes ult-glow {
  0%{box-shadow:0 0 10px rgba(212,160,23,0.2)} 100%{box-shadow:0 0 25px rgba(212,160,23,0.5)}
}
.skill-panel.disabled { pointer-events:none; opacity:0.3; }

/* ============================================
   ส่วนที่ 7: เอฟเฟคภาพเคลื่อนไหว (Animations)
   - ตัวละครโดนตี: สั่น + สว่างขึ้น
   - ตัวเลข damage ลอยขึ้น
   - หน้าจอสั่นเมื่อโดนหนัก
   - Splash เปลี่ยนเทิร์น
   ============================================ */
@keyframes hit-react {
  0%{transform:translateX(0);filter:brightness(1)}
  15%{transform:translateX(-25px);filter:brightness(3)}
  30%{transform:translateX(20px);filter:brightness(1.5)}
  45%{transform:translateX(-15px);filter:brightness(2.5)}
  60%{transform:translateX(10px);filter:brightness(1.2)}
  75%{transform:translateX(-5px);filter:brightness(1.8)}
  100%{transform:translateX(0);filter:brightness(1)}
}
.hit-anim { animation: hit-react 0.5s ease-out; }
@keyframes screen-shake {
  0%,100%{transform:translate(0,0)} 10%{transform:translate(-8px,-4px)}
  20%{transform:translate(8px,4px)} 30%{transform:translate(-6px,8px)}
  40%{transform:translate(6px,-8px)} 50%{transform:translate(-8px,4px)}
  60%{transform:translate(8px,-4px)} 70%{transform:translate(-4px,-8px)}
  80%{transform:translate(4px,8px)} 90%{transform:translate(-8px,-4px)}
}
.shake { animation: screen-shake 0.4s ease-in-out; }
.damage-num {
  position:absolute; font-weight:900; pointer-events:none; z-index:100;
  animation: float-up 1.2s ease-out forwards; white-space:nowrap;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.damage-num.normal { font-size:1.6rem; color:#ff4444; }
.damage-num.crit { font-size:2.4rem; color:#ffcc00; filter:drop-shadow(0 0 12px #ff8800); }
.damage-num.heal { font-size:1.4rem; color:#44ff88; }
.damage-num.miss { font-size:1.8rem; color:#aaaaaa; font-style:italic; }
.damage-num.ult-dmg { font-size:2.8rem; color:#ff2244; filter:drop-shadow(0 0 20px #ff0000); }
@keyframes float-up {
  0%{transform:translateY(0) scale(0.5);opacity:0}
  15%{transform:translateY(-10px) scale(1.2);opacity:1}
  30%{transform:translateY(-25px) scale(1);opacity:1}
  100%{transform:translateY(-90px) scale(0.8);opacity:0}
}
.turn-splash {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:600;
  background:rgba(0,0,0,0.75);
  animation: splash-anim 1.3s ease-in-out forwards;
}
.turn-splash .splash-text {
  font-size:clamp(1.5rem,5vw,3rem); font-weight:900;
  animation: splash-text-in 1.3s ease-in-out forwards;
}
.turn-splash .splash-sub {
  font-size:clamp(0.8rem,2vw,1.2rem); color:var(--muted); margin-top:0.5rem;
}
@keyframes splash-anim {
  0%{opacity:0} 15%{opacity:1} 75%{opacity:1} 100%{opacity:0}
}
@keyframes splash-text-in {
  0%{transform:scale(3);opacity:0} 20%{transform:scale(1);opacity:1} 75%{transform:scale(1);opacity:1} 100%{transform:scale(0.8);opacity:0}
}
/* อนิเมชัน idle ตัวละคร */
@keyframes char-idle {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}
}
.battle-char .char-body { animation: char-idle 2.5s ease-in-out infinite; }
/* อนิเมชันตาย */
@keyframes char-death {
  0%{transform:rotate(0);opacity:1;filter:brightness(1)}
  50%{transform:rotate(15deg);opacity:0.6;filter:brightness(3)}
  100%{transform:rotate(90deg) translateY(30px);opacity:0.2;filter:brightness(0.3) saturate(0)}
}
.death-anim .char-body { animation: char-death 1s ease-in forwards !important; }
/* อนิเมชันใช้สกิล */
@keyframes char-attack {
  0%{transform:scale(1)} 30%{transform:scale(1.15)} 60%{transform:scale(0.95)} 100%{transform:scale(1)}
}
.attack-anim .char-body { animation: char-attack 0.4s ease-out !important; }

/* ============================================
   ส่วนที่ 8: หน้าจอผล (Result Screen)
   ============================================ */
#screen-result {
  justify-content:center; gap:1.5rem;
  background:radial-gradient(ellipse at 50% 50%, #1a1000 0%, var(--bg) 70%);
}
.result-title {
  font-size:clamp(2rem,7vw,4rem); font-weight:900;
  text-align:center;
}
.result-winner {
  background:linear-gradient(135deg, var(--accent), var(--accent2), #fff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.result-loser { color:#ff4466; }
.result-char-name { font-size:clamp(1rem,3vw,1.5rem); text-align:center; color:var(--fg); }
.btn-restart {
  padding:0.8rem 2.5rem; font-size:1rem; font-weight:700;
  background:var(--card); color:var(--accent);
  border:2px solid var(--accent); border-radius:50px;
  cursor:pointer; transition:all 0.3s;
  font-family:'Prompt',sans-serif;
}
.btn-restart:hover { background:var(--accent); color:#0a0a0f; }

/* คอนเฟตติ */
.confetti {
  position:fixed; width:10px; height:10px; z-index:550;
  animation: confetti-fall linear forwards;
  pointer-events:none;
}
@keyframes confetti-fall {
  0%{transform:translateY(-10vh) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ============================================
   ส่วนที่ 9: Responsive
   ============================================ */
@media(max-width:700px) {
  .battle-arena { flex-direction:column; align-items:center; }
  .battle-center { order:-1; min-width:auto; padding:0.3rem 0; }
  .skill-panel { grid-template-columns:repeat(2,1fr); }
  .skill-panel .skill-btn:last-child { grid-column:span 2; }
  .battle-log { height:60px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- ============================================
     Canvas สำหรับวาดเอฟเฟคอนุภาค
     ทับอยู่บนสุดของทุกหน้าจอ
     ============================================ -->
<canvas id="fx-canvas"></canvas>

<!-- ============================================
     หน้าจอที่ 1: ชื่อเกม (Title Screen)
     แสดงชื่อเกม คำบรรยาย และปุ่มเริ่ม
     ============================================ -->
<div id="screen-title" class="game-screen active">
  <div class="title-main">ศึกชิงบัลลังก์</div>

<!-- ============================================

     ============================================ -->

  <div class="char-grid" id="char-grid"></div>

</div>

<!-- ============================================

     ============================================ -->

/* ============================================================
   ส่วนที่ 3: ระบบเอฟเฟคอนุภาค (Particle Effect System)
   - ใช้ Canvas 2D วาดอนุภาคสีสันต่างๆ
   - แต่ละ element มีสีและพฤติกรรมต่างกัน
   - เรียกใช้ผ่าน fx.play('fire', x, y)
   ============================================================ */
const fx = {
  canvas: null, ctx: null, particles: [], running: false,

  /* เริ่มต้นระบบ - ตั้งค่า canvas ให้เท่าหน้าจอ */
  init() {
    this.canvas = document.getElementById('fx-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
  },

  /* ปรับขนาด canvas ให้เท่า viewport */
  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  },

  /* เล่นเอฟเฟคตามประเภท ที่ตำแหน่ง x,y */
  play(type, x, y, intensity = 1) {
    const configs = {
      fire: { colors:['#ff4400','#ff8800','#ffcc00','#ff0000','#ff6600'], count:40, speed:8, size:6, gravity:-2 },
      ice: { colors:['#00bbff','#88ddff','#ffffff','#aaddff','#0088cc'], count:35, speed:6, size:5, gravity:0 },
      thunder: { colors:['#ffcc00','#ffee66','#ffffff','#ffaa00'], count:30, speed:12, size:4, gravity:0 },
      nature: { colors:['#00cc44','#66ff99','#88ff44','#44cc00','#aaff66'], count:30, speed:5, size:5, gravity:-1 },
      shadow: { colors:['#aa44ff','#cc88ff','#6600cc','#8800ff','#440088'], count:35, speed:7, size:5, gravity:0 },
      heal: { colors:['#44ff88','#88ffbb','#00ff66','#aaffcc'], count:25, speed:3, size:4, gravity:-3 },
      buff: { colors:['#ffcc00','#ffffff','#ffee88'], count:20, speed:4, size:3, gravity:-2 },
      hit: { colors:['#ffffff','#ffcc00','#ff8800'], count:15, speed:10, size:3, gravity:0 },
      ultimate: { colors:['#ff2244','#ffcc00','#ffffff','#ff8800','#ff4400'], count:80, speed:14, size:8, gravity:-1 },
      miss: { colors:['#888888','#aaaaaa','#666666'], count:10, speed:4, size:3, gravity:1 }
    };
    const c = configs[type] || configs.hit;
    for (let i = 0; i < Math.round(c.count * intensity); i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = (Math.random() * 0.7 + 0.3) * c.speed;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd + (c.gravity || 0),
        life: 1,
        decay: 0.015 + Math.random() * 0.025,
        color: c.colors[Math.floor(Math.random() * c.colors.length)],
        size: (Math.random() * 0.6 + 0.4) * c.size,
        type
      });
    }
    /* สำหรับสายฟ้า เพิ่มเส้นสายฟ้า */
    if (type === 'thunder' || type === 'ultimate') {
      this.drawLightning(x, y, type === 'ultimate' ? 5 : 2);
    }
    if (!this.running) { this.running = true; this.animate(); }
  },

  /* วาดเส้นสายฟ้าแบบสุ่ม */
  drawLightning(x, y, branches) {
    for (let b = 0; b < branches; b++) {
      let lx = x + (Math.random()-0.5)*100;
      let ly = 0;
      const endY = y;
      const segs = 8 + Math.floor(Math.random()*6);
      const points = [{x:lx, y:ly}];
      for (let i = 1; i <= segs; i++) {
        lx += (Math.random()-0.5)*60;
        ly += (endY - 0) / segs;
        points.push({x:lx, y:ly});
      }
      this.particles.push({
        type:'lightning', points, life:1, decay:0.04,
        color: type==='ultimate' ? '#ffcc00' : '#ffee88'
      });
    }
  },

  /* ลูป animation ของอนุภาค - วาดและอัปเดตทุกเฟรม */
  animate() {
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life -= p.decay;
      if (p.life <= 0) { this.particles.splice(i, 1); continue; }

      this.ctx.globalAlpha = p.life;

      if (p.type === 'lightning') {
        /* วาดเส้นสายฟ้าจากจุด array */
        this.ctx.strokeStyle = p.color;
        this.ctx.lineWidth = 3 * p.life;
        this.ctx.shadowColor = p.color;
        this.ctx.shadowBlur = 15;
        this.ctx.beginPath();
        this.ctx.moveTo(p.points[0].x, p.points[0].y);
        for (let j = 1; j < p.points.length; j++) {
          this.ctx.lineTo(p.points[j].x, p.points[j].y);
        }
        this.ctx.stroke();
        this.ctx.shadowBlur = 0;
      } else {
        /* วาดอนุภาควงกลม */
        this.ctx.fillStyle = p.color;
        this.ctx.shadowColor = p.color;
        this.ctx.shadowBlur = p.size * 2;
        this.ctx.beginPath();
        this.ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
        this.ctx.fill();
        this.ctx.shadowBlur = 0;

        /* อัปเดตตำแหน่ง */
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15; /* แรงโน้มถ่วงเล็กน้อย */
        p.vx *= 0.98;  /* ลดความเร็วตามเวลา */
      }
    }
    this.ctx.globalAlpha = 1;

    if (this.particles.length > 0) {
      requestAnimationFrame(() => this.animate());
    } else {
      this.running = false;
    }
  }
};

/* ============================================================
   ส่วนที่ 4: ระบบเสียง (Sound System)
   - ใช้ Web Audio API สร้างเสียง programmatically
   - ไม่ต้องโหลดไฟล์เสียงภายนอก
   - แต่ละประเภทมีความถี่และรูปแบบต่างกัน
   ============================================================ */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    switch(type) {
      case 'hit':
        osc.type='sawtooth'; osc.frequency.setValueAtTime(300,t);
        osc.frequency.exponentialRampToValueAtTime(80,t+0.12);
        gain.gain.setValueAtTime(0.15,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.12);
        osc.start(t); osc.stop(t+0.12); break;
      case 'crit':
        osc.type='square'; osc.frequency.setValueAtTime(500,t);
        osc.frequency.exponentialRampToValueAtTime(100,t+0.2);
        gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.25);
        osc.start(t); osc.stop(t+0.25); break;
      case 'heal':
        osc.type='sine'; osc.frequency.setValueAtTime(400,t);
        osc.frequency.exponentialRampToValueAtTime(800,t+0.3);
        gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        osc.start(t); osc.stop(t+0.35); break;
      case 'miss':
        osc.type='sine'; osc.frequency.setValueAtTime(400,t);
        osc.frequency.exponentialRampToValueAtTime(200,t+0.2);
        gain.gain.setValueAtTime(0.08,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.2);
        osc.start(t); osc.stop(t+0.2); break;
      case 'ult':
        osc.type='sawtooth'; osc.frequency.setValueAtTime(100,t);
        osc.frequency.linearRampToValueAtTime(600,t+0.4);
        osc.frequency.linearRampToValueAtTime(200,t+0.6);
        gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.7);
        osc.start(t); osc.stop(t+0.7); break;
      case 'buff':
        osc.type='triangle'; osc.frequency.setValueAtTime(500,t);
        osc.frequency.exponentialRampToValueAtTime(700,t+0.15);
        gain.gain.setValueAtTime(0.08,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.2);
        osc.start(t); osc.stop(t+0.2); break;
      case 'death':
        osc.type='sawtooth'; osc.frequency.setValueAtTime(300,t);
        osc.frequency.exponentialRampToValueAtTime(30,t+0.8);
        gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.8);
        osc.start(t); osc.stop(t+0.8); break;
      case 'select':
        osc.type='sine'; osc.frequency.setValueAtTime(600,t);
        gain.gain.setValueAtTime(0.06,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.08);
        osc.start(t); osc.stop(t+0.08); break;
    }
  } catch(e) {}
}

/* ============================================================
   ส่วนที่ 5: สถานะเกม (Game State)
   - เก็บข้อมูลผู้เล่น, เทิร์น, ตัวเลือกตัวละคร
   ============================================================ */
let state = {
  phase: 'title',       // title, select, battle, result
  selectPhase: 1,       // 1 = P1 เลือก, 2 = P2 เลือก
  p1CharId: null,       // id ตัวละครที่ P1 เลือก
  p2CharId: null,       // id ตัวละครที่ P2 เลือก
  players: [null, null], // [player1 state, player2 state]
  currentTurn: 0,       // 0 = P1, 1 = P2
  turnCount: 0,
  isAnimating: false     // ป้องกันคลิกซ้ำระหว่าง animation
};

/* ============================================================
   ส่วนที่ 6: จัดการหน้าจอ (Screen Management)
   - สลับหน้าจอโดยซ่อน/แสดง div ที่มี class game-screen
   ============================================================ */
function showScreen(id) {
  document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  state.phase = id.replace('screen-','');
}

/* ============================================================
   ส่วนที่ 7: สร้างการ์ดเลือกตัวละคร
   - วนลูปสร้างการ์ดจากข้อมูล CHARS
   - แสดง stat bars สีตาม element
   ============================================================ */
function goToSelect() {
  playSound('select');
  state.selectPhase = 1;
  state.p1CharId = null;
  state.p2CharId = null;
  document.getElementById('select-header').textContent = 'ผู้เล่น 1: เลือกตัวละคร';
  document.getElementById('btn-fight').classList.remove('show');
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  CHARS.forEach(c => {
    const maxStat = 150; // ค่าสถิติสูงสุดสำหรับคำนวณ % แถบ
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="select-badge" style="background:${c.color}"></div>
      <div class="char-icon" style="background:linear-gradient(135deg,${c.colorDark},${c.color},${c.colorLight})">
        <i class="fas ${c.icon}"></i>
        <div style="position:absolute;inset:-6px;border-radius:50%;border:2px solid ${c.color};opacity:0.4;animation:aura-pulse 2s ease-in-out infinite"></div>
      </div>
      <div class="char-name">${c.name}</div>
      <div class="char-title">${c.title} | ${c.element}</div>
      <div class="stat-row"><span>HP</span><div class="stat-bar"><div class="stat-fill" style="width:${c.hp/12}%;background:${c.color}"></div></div><span>${c.hp}</span></div>
      <div class="stat-row"><span>ATK</span><div class="stat-bar"><div class="stat-fill" style="width:${c.atk/maxStat*100}%;background:#ff4444"></div></div><span>${c.atk}</span></div>
      <div class="stat-row"><span>DEF</span><div class="stat-bar"><div class="stat-fill" style="width:${c.def/maxStat*100}%;background:#4488ff"></div></div><span>${c.def}</span></div>
      <div class="stat-row"><span>SPD</span><div class="stat-bar"><div class="stat-fill" style="width:${c.spd/maxStat*100}%;background:#ffcc00"></div></div><span>${c.spd}</span></div>
      <div style="font-size:0.6rem;color:var(--muted);margin-top:0.5rem;line-height:1.4">${c.desc}</div>
    `;
    card.addEventListener('click', () => selectChar(c.id));
    grid.appendChild(card);
  });
  showScreen('screen-select');
}

/* ============================================================
   ส่วนที่ 8: ตรรกะการเลือกตัวละคร
   - P1 เลือกก่อน → ไฮไลท์การ์ดสีฟ้า
   - P2 เลือกต่อ → ไฮไลท์การ์ดสีแดง + ปิดการ์ดซ้ำ
   - ทั้งคู่เลือกแล้ว → แสดงปุ่ม "เริ่มต่อสู้"
   ============================================================ */
function selectChar(id) {
  playSound('select');
  const cards = document.querySelectorAll('.char-card');
  if (state.selectPhase === 1) {
    state.p1CharId = id;
    cards.forEach(c => {
      c.classList.remove('p1-selected');
      if (c.dataset.id === id) {
        c.classList.add('p1-selected');
        c.querySelector('.select-badge').textContent = 'P1';
      }
    });
    state.selectPhase = 2;
    document.getElementById('select-header').textContent = 'ผู้เล่น 2: เลือกตัวละคร';
  } else if (state.selectPhase === 2) {
    if (id === state.p1CharId) return; // ไม่ให้เลือกซ้ำ
    state.p2CharId = id;
    cards.forEach(c => {
      c.classList.remove('p2-selected','disabled');
      if (c.dataset.id === id) {
        c.classList.add('p2-selected');
        c.querySelector('.select-badge').textContent = 'P2';
      }
      if (c.dataset.id === state.p1CharId) c.classList.add('disabled');
    });
    document.getElementById('btn-fight').classList.add('show');
  }
}

/* ============================================================
   ส่วนที่ 9: เริ่มการต่อสู้ (Start Battle)
   - สร้าง state ผู้เล่นจากข้อมูลตัวละคร
   - ตั้งค่า HP, cooldowns, buffs, debuffs
   - กำหนดเทิร์นแรกตาม SPD (เร็วกว่าไปก่อน)
   ============================================================ */
function startBattle() {
  playSound('select');
  const c1 = CHARS.find(c => c.id === state.p1CharId);
  const c2 = CHARS.find(c => c.id === state.p2CharId);

  /* สร้าง state ผู้เล่นแต่ละคน */
  state.players = [
    {
      char: c1, currentHp: c1.hp, maxHp: c1.hp,
      buffs: [], debuffs: [], cooldowns: [0,0,0,0,0],
      ultCharge: 0, isHidden: false, critBonus: 0
    },
    {
      char: c2, currentHp: c2.hp, maxHp: c2.hp,
      buffs: [], debuffs: [], cooldowns: [0,0,0,0,0],
      ultCharge: 0, isHidden: false, critBonus: 0
    }
  ];

  /* กำหนดเทิร์นแรก: ผู้ที่ SPD สูงกว่าไปก่อน */
  state.currentTurn = c1.spd >= c2.spd ? 0 : 1;
  state.turnCount = 0;
  state.isAnimating = false;

  /* วาดตัวละครในสนาม */
  renderBattleChar('p1-char', c1);
  renderBattleChar('p2-char', c2);

  /* ล้างบันทึก */
  document.getElementById('battle-log').innerHTML = '';

  showScreen('screen-battle');
  addLog(`ศึกต่อสู้เริ่มขึ้น! ${c1.name} vs ${c2.name}`, 'system');
  addLog(`${c1.name}: "${c1.skills[0].quote}"`, 'funny');

  /* แสดง splash เทิร์นแรก */
  setTimeout(() => startTurn(), 500);
}

/* ============================================================
   ส่วนที่ 10: วาดตัวละครในสนามต่อสู้
   - สร้าง div ตัวละครด้วย CSS ตาม element
   - มีวงแสง (aura) รอบๆ
   ============================================================ */
function renderBattleChar(containerId, char) {
  const el = document.getElementById(containerId);
  el.className = 'battle-char';
  el.innerHTML = `
    <div class="aura-ring" style="border-color:${char.color}"></div>
    <div class="char-body" style="background:linear-gradient(160deg,${char.colorDark},${char.color} 40%,${char.colorLight} 100%)">
      <i class="fas ${char.icon}"></i>
    </div>
  `;
}

/* ============================================================
   ส่วนที่ 11: ระบบเทิร์น (Turn System)
   - แสดง splash "ตาของผู้เล่น X"
   - ตรวจสถานะก่อนเริ่มเทิร์น (stun/freeze/root → ข้ามเทิร์น)
   - ประมวลผล debuff ที่ทำดาเมจต่อเนื่อง (burn/poison/bleed)
   - ลด cooldowns
   - เพิ่ม ult charge อัตโนมัติ
   - แสดงปุ่มสกิล
   ============================================================ */
function startTurn() {
  state.isAnimating = true;
  state.turnCount++;
  const pi = state.currentTurn;
  const p = state.players[pi];
  const pName = p.char.name;
  const turnLabel = pi === 0 ? 'ผู้เล่น 1' : 'ผู้เล่น 2';
  const turnColor = pi === 0 ? '#00aaff' : '#ff4466';

  /* แสดง splash เทิร์น */
  showTurnSplash(`${turnLabel}: ${pName}`, turnColor);

  setTimeout(() => {
    /* ตรวจ stun/freeze/root - ถ้ามีจะข้ามเทิร์น */
    const ccEffect = p.debuffs.find(d => d.type === 'freeze' || d.type === 'stun' || d.type === 'root');
    if (ccEffect) {
      const effectName = ccEffect.type === 'freeze' ? 'แช่แข็ง' : ccEffect.type === 'stun' ? 'มึนงง' : 'ติดผูก';
      addLog(`${pName} ถูก${effectName}! ข้ามเทิร์นนี้`, pi===0?'p1':'p2');
      addLog(pickRandom(['ไม่ได้เล่นเลยสักที! น่าเสียดาย!','อุ๊ย ข้ามไปอีกเทิร์นแล้ว!']), 'funny');
      /* ลดเวลา debuff */
      tickEffects(pi);
      endTurn();
      return;
    }

    /* ประมวลผล debuff ที่ทำดาเมจต่อเนื่อง */
    let dotDmg = 0;
    p.debuffs.forEach(d => {
      if (d.type === 'burn') dotDmg += Math.round(p.maxHp * 0.03);
      if (d.type === 'poison') dotDmg += Math.round(p.maxHp * 0.02);
      if (d.type === 'bleed') dotDmg += Math.round(p.maxHp * 0.04);
    });
    if (dotDmg > 0) {
      p.currentHp = Math.max(0, p.currentHp - dotDmg);
      addLog(`${pName} ได้รับดาเมจจากสถานะ ${dotDmg} HP`, 'system');
      showDamageNumber(pi, dotDmg, 'normal');
      playSound('hit');
      if (p.currentHp <= 0) {
        updateUI();
        setTimeout(() => endGame(1 - pi), 600);
        return;
      }
    }

    /* ลดเวลา buff/debuff 1 เทิร์น */
    tickEffects(pi);

    /* ลด cooldown ทุกสกิล 1 เทิร์น */
    p.cooldowns = p.cooldowns.map(cd => Math.max(0, cd - 1));

    /* เพิ่ม ult charge อัตโนมัติ +5 */
    p.ultCharge = Math.min(100, p.ultCharge + 5);

    /* อัปเดต UI และแสดงปุ่มสกิล */
    updateUI();
    renderSkillPanel();
    document.getElementById('skill-panel').classList.remove('disabled');
    state.isAnimating = false;
  }, 1400);
}

/* ============================================================
   ส่วนที่ 12: ลดเวลา buff/debuff
   - ลด turns ที่เหลือของแต่ละ effect
   - ลบ effect ที่หมดเวลา
   ============================================================ */
function tickEffects(pi) {
  const p = state.players[pi];
  p.buffs = p.buffs.filter(b => { b.turns--; return b.turns > 0; });
  p.debuffs = p.debuffs.filter(d => { d.turns--; return d.turns > 0; });
}

/* ============================================================
   ส่วนที่ 13: แสดง Splash เปลี่ยนเทิร์น
   - วาง div ทับหน้าจอ แสดงชื่อผู้เล่น
   - หายไปเองหลัง 1.3 วินาที
   ============================================================ */
function showTurnSplash(text, color) {
  const splash = document.createElement('div');
  splash.className = 'turn-splash';
  splash.innerHTML = `
    <div class="splash-text" style="color:${color}">${text}</div>
    <div class="splash-sub">เลือกสกิลเพื่อโจมตี</div>
  `;
  document.body.appendChild(splash);
  setTimeout(() => splash.remove(), 1400);
}

/* ============================================================
   ส่วนที่ 14: แสดงปุ่มสกิล (Render Skill Panel)
   - สร้าง 5 ปุ่มจากข้อมูลสกิลของผู้เล่นปัจจุบัน
   - ปุ่มที่ CD จะมี overlay มืด + เลข CD
   - อัลติเมทจะล็อกถ้า charge < 100
   ============================================================ */
function renderSkillPanel() {
  const pi = state.currentTurn;
  const p = state.players[pi];
  const panel = document.getElementById('skill-panel');
  panel.innerHTML = '';
  const prefix = pi === 0 ? 'p1' : 'p2';

  p.char.skills.forEach((sk, i) => {
    const btn = document.createElement('button');
    let cls = 'skill-btn';
    if (sk.isUlt) cls += ' ult-btn';

    /* ตรวจ cooldown */
    const onCd = p.cooldowns[i] > 0;
    if (onCd) cls += ' on-cd';

    /* ตรวจอัลติเมท charge */
    const locked = sk.isUlt && p.ultCharge < 100;
    if (locked) cls += ' locked';

    btn.className = cls;

    /* สีขอบตาม element */
    if (!sk.isUlt) {
      btn.style.borderColor = p.char.color + '44';
      btn.addEventListener('mouseenter', () => { if(!onCd && !locked) btn.style.borderColor = p.char.color; });
      btn.addEventListener('mouseleave', () => { btn.style.borderColor = p.char.color + '44'; });
    } else {
      btn.style.borderColor = p.ultCharge >= 100 ? 'var(--accent)' : 'var(--border)';
    }

    btn.innerHTML = `
      <div class="skill-name" style="color:${sk.isUlt ? 'var(--accent)' : p.char.colorLight}">
        ${sk.isUlt ? '<i class="fas fa-star" style="margin-right:4px"></i>' : ''}${sk.name}
      </div>
      <div class="skill-desc">${sk.desc}${sk.isUlt ? ` [${p.ultCharge}%]` : ''}</div>
      <div class="skill-quote">"${sk.quote}"</div>
      ${onCd ? `<div class="cd-overlay">${p.cooldowns[i]}</div>` : ''}
      ${locked ? '<div class="cd-overlay" style="font-size:0.7rem"><i class="fas fa-lock"></i></div>' : ''}
    `;

    if (!onCd && !locked) {
      btn.addEventListener('click', () => executeSkill(i));
    }
    panel.appendChild(btn);
  });
}

/* ============================================================
   ส่วนที่ 15: ดำเนินการสกิล (Execute Skill)
   - คำนวณดาเมจ: ATK × multiplier × ตัวแปรต่างๆ
   - ตรวจ miss (5% สกิลปกติ, 0% อัลติเมท)
   - ตรวจ critical hit (10% + bonus)
   - ลดดาเมจด้วย DEF ของเป้าหมาย
   - ใช้เอฟเฟค, เสียง, animation
   - ตรวจสถานะ win/lose
   ============================================================ */
function executeSkill(skillIndex) {
  if (state.isAnimating) return;
  state.isAnimating = true;
  document.getElementById('skill-panel').classList.add('disabled');

  const pi = state.currentTurn;         // ดัชนีผู้โจมตี (0=P1, 1=P2)
  const ti = 1 - pi;                    // ดัชนีเป้าหมาย
  const atk = state.players[pi];        // ข้อมูลผู้โจมตี
  const def = state.players[ti];        // ข้อมูลผู้ป้องกัน
  const sk = atk.char.skills[skillIndex];
  const atkName = atk.char.name;
  const defName = def.char.name;
  const logClass = pi === 0 ? 'p1' : 'p2';

  /* บันทึกใช้สกิล */
  addLog(`${atkName} ใช้ "${sk.name}" - "${sk.quote}"`, logClass);

  /* แสดง animation โจมตี */
  const atkCharEl = document.getElementById(`${pi===0?'p1':'p2'}-char`);
  atkCharEl.classList.add('attack-anim');
  setTimeout(() => atkCharEl.classList.remove('attack-anim'), 400);

  /* ตั้งค่า cooldown ของสกิล */
  if (sk.maxCd > 0) atk.cooldowns[skillIndex] = sk.maxCd;

  /* เพิ่ม ult charge จากการโจมตี */
  atk.ultCharge = Math.min(100, atk.ultCharge + 10);

  /* ---- ประเภทสกิลที่ไม่โจมตีโดยตรง ---- */
  if (sk.effect === 'buffDef') {
    atk.buffs.push({ type:'buffDef', turns:2, value:0.5 });
    fx.play('buff', ...getCharPos(pi));
    playSound('buff');
    addLog(pickRandom(FUNNY.buffDef), 'funny');
    updateUI();
    setTimeout(() => endTurn(), 800);
    return;
  }
  if (sk.effect === 'buffSpd') {
    atk.buffs.push({ type:'buffSpd', turns:2, value:1.0 });
    fx.play('buff', ...getCharPos(pi));
    playSound('buff');
    addLog(pickRandom(FUNNY.buffSpd), 'funny');
    updateUI();
    setTimeout(() => endTurn(), 800);
    return;
  }
  if (sk.effect === 'hide') {
    atk.isHidden = true;
    atk.critBonus += 0.3;
    fx.play('shadow', ...getCharPos(pi));
    playSound('buff');
    addLog(pickRandom(FUNNY.hide), 'funny');
    updateUI();
    setTimeout(() => endTurn(), 800);
    return;
  }
  if (sk.effect === 'heal') {
    const heal = sk.healAmt || 200;
    atk.currentHp = Math.min(atk.maxHp, atk.currentHp + heal);
    fx.play('heal', ...getCharPos(pi));
    playSound('heal');
    showDamageNumber(pi, heal, 'heal');
    addLog(`${atkName} ฟื้น HP +${heal}`, 'system');
    addLog(pickRandom(FUNNY.heal), 'funny');
    updateUI();
    setTimeout(() => endTurn(), 800);
    return;
  }
  if (sk.effect === 'cleanse') {
    atk.debuffs = [];
    const heal = sk.healAmt || 150;
    atk.currentHp = Math.min(atk.maxHp, atk.currentHp + heal);
    fx.play('heal', ...getCharPos(pi));
    playSound('heal');
    showDamageNumber(pi, heal, 'heal');
    addLog(`${atkName} ลบสถานะเสียทั้งหมดและฟื้น +${heal}`, 'system');
    addLog('สะอาดหมดจด! สดใสเหมือนเด็ก!','funny');
    updateUI();
    setTimeout(() => endTurn(), 800);
    return;
  }
  if (sk.effect === 'healCleanseBurn') {
    /* อัลติเมทของดรูอิด: ฟื้น + ลบ debuff + โจมตีเผา */
    atk.debuffs = [];
    const heal = sk.healAmt || 500;
    atk.currentHp = Math.min(atk.maxHp, atk.currentHp + heal);
    fx.play('heal', ...getCharPos(pi));
    fx.play('nature', ...getCharPos(ti), 1.5);
    playSound('ult');
    showDamageNumber(pi, heal, 'heal');
    addLog(`${atkName} ฟื้น +${heal} ลบ debuff ทั้งหมด!`, 'system');
    addLog(pickRandom(FUNNY.ult), 'funny');

    /* โจมตีด้วย */
    setTimeout(() => {
      const dmg = calcDamage(atk, def, sk.mult);
      applyDamage(ti, dmg.final, dmg.isCrit, sk);
      def.ultCharge = Math.min(100, def.ultCharge + 15);
      updateUI();
      if (def.currentHp <= 0) {
        setTimeout(() => endGame(pi), 800);
      } else {
        setTimeout(() => endTurn(), 600);
      }
    }, 600);
    return;
  }

  /* ---- สกิลโจมตี ---- */
  playSound(sk.isUlt ? 'ult' : 'hit');

  /* ตรวจ miss: 5% สกิลปกติ, 0% อัลติเมท */
  const missChance = sk.isUlt ? 0 : 0.05;
  if (Math.random() < missChance) {
    fx.play('miss', ...getCharPos(ti));
    playSound('miss');
    showDamageNumber(ti, 0, 'miss');
    addLog('พลาด! ไม่โดน!', 'system');
    addLog(pickRandom(FUNNY.miss), 'funny');
    updateUI();
    setTimeout(() => endTurn(), 800);
    return;
  }

  /* ตรวจ hidden (หลบซ่อนของเป้าหมาย) */
  if (def.isHidden) {
    def.isHidden = false;
    fx.play('miss', ...getCharPos(ti));
    playSound('miss');
    showDamageNumber(ti, 0, 'miss');
    addLog(`${defName} หลบซ่อนอยู่! โจมตีไม่ถึง!`, 'system');
    addLog(pickRandom(FUNNY.dodge), 'funny');
    updateUI();
    setTimeout(() => endTurn(), 800);
    return;
  }

  /* คำนวณดาเมจ */
  const dmg = calcDamage(atk, def, sk.mult);

  /* แสดงเอฟเฟค */
  const fxType = sk.isUlt ? 'ultimate' : atk.char.id;
  const fxIntensity = sk.isUlt ? 2 : 1;
  fx.play(fxType, ...getCharPos(ti), fxIntensity);

  /* แสดงเลขดาเมจ */
  const dmgClass = sk.isUlt ? 'ult-dmg' : (dmg.isCrit ? 'crit' : 'normal');
  showDamageNumber(ti, dmg.final, dmgClass);

  /* สั่นหน้าจอถ้าดาเมจสูง */
  if (dmg.final > 200 || sk.isUlt) {
    document.getElementById('battle-arena').classList.add('shake');
    setTimeout(() => document.getElementById('battle-arena').classList.remove('shake'), 400);
  }

  /* บันทึกดาเมจ */
  if (dmg.isCrit) {
    addLog(`คริติคอล! ${defName} ได้รับ ${dmg.final} ดาเมจ!`, 'system');
    addLog(pickRandom(FUNNY.crit), 'funny');
    playSound('crit');
  } else {
    addLog(`${defName} ได้รับ ${dmg.final} ดาเมจ`, logClass);
  }

  /* ใช้ดาเมจกับเป้าหมาย */
  applyDamage(ti, dmg.final, dmg.isCrit, sk);

  /* เพิ่ม ult charge ให้เป้าหมาย (จากการโดนตี) */
  def.ultCharge = Math.min(100, def.ultCharge + 15);

  /* ลด ult charge ของผู้โจมตีถ้าใช้อัลติเมท */
  if (sk.isUlt) atk.ultCharge = 0;

  updateUI();

  /* ตรวจ win/lose */
  if (def.currentHp <= 0) {
    setTimeout(() => endGame(pi), 800);
  } else {
    setTimeout(() => endTurn(), 800);
  }
}

/* ============================================================
   ส่วนที่ 16: คำนวณดาเมจ (Damage Calculation)
   - สูตร: baseDmg = ATK × multiplier
   - ลดด้วย DEF: reducedDmg = baseDmg × DEF/(DEF+200)
   - ตรวจ buff DEF ของเป้าหมาย
   - คูณ random factor 0.9~1.1
   - ตรวจ critical: 10% + critBonus, คูณ 1.5
   - สกิล ice pierce: ลดเกราะ 50%
   ============================================================ */
function calcDamage(atk, def, multiplier) {
  let effectiveDef = def.def;

  /* เพิ่ม DEF จาก buff */
  const defBuff = def.buffs.find(b => b.type === 'buffDef');
  if (defBuff) effectiveDef *= (1 + defBuff.value);

  /* ตรวจ pierce (ท่าแทงทะลุของ Ice) */
  const isPiercing = false; // สามารถเพิ่ม logic ได้

  let baseDmg = atk.atk * multiplier;
  let reduction = effectiveDef / (effectiveDef + 200);
  let afterDef = baseDmg * (1 - reduction);

  /* Random factor */
  let randomFactor = 0.9 + Math.random() * 0.2;
  let finalDmg = Math.round(afterDef * randomFactor);

  /* Critical check */
  let critChance = 0.10 + atk.critBonus;
  let isCrit = Math.random() < critChance;
  if (isCrit) {
    finalDmg = Math.round(finalDmg * 1.5);
    atk.critBonus = Math.max(0, atk.critBonus - 0.3); // ใช้ crit bonus แล้วลด
  }

  /* ลด crit bonus ทุกเทิร์นเล็กน้อย */
  atk.critBonus = Math.max(0, atk.critBonus - 0.05);

  return { final: Math.max(1, finalDmg), isCrit, base: Math.round(baseDmg), reduced: Math.round(afterDef) };
}

/* ============================================================
   ส่วนที่ 17: ใช้ดาเมจกับเป้าหมาย + ตรวจ effect
   - ลด HP
   - ตรวจสถานะพิเศษ (burn, freeze, stun, poison, bleed, slow, root)
   - ตรวจ lifesteal
   - ตรวจ instant kill (อัลติเมท shadow)
   - เล่น animation ถูกตี
   ============================================================ */
function applyDamage(targetIndex, damage, isCrit, skill) {
  const target = state.players[targetIndex];
  const attacker = state.players[1 - targetIndex];

  /* ตรวจ instant kill */
  if (skill.effect === 'instantKill' && target.currentHp < target.maxHp * 0.15) {
    if (Math.random() < skill.chance) {
      target.currentHp = 0;
      addLog(`${target.char.name} ถูกฆ่าตับตรง!! น่าสยดสยอง!`, 'system');
      fx.play('shadow', ...getCharPos(targetIndex), 2);
      triggerHitAnim(targetIndex);
      return;
    }
  }

  /* ลด HP */
  target.currentHp = Math.max(0, target.currentHp - damage);

  /* เล่น animation ถูกตี */
  triggerHitAnim(targetIndex);

  /* ใช้สถานะพิเศษ */
  if (skill.effect && skill.chance > 0) {
    const effectTypes = ['burn','freeze','stun','poison','bleed','slow','root'];
    if (effectTypes.includes(skill.effect)) {
      if (Math.random() < skill.chance) {
        /* ตรวจว่ามี effect เดียวกันอยู่แล้วไหม */
        const existing = target.debuffs.find(d => d.type === skill.effect);
        if (!existing) {
          const turns = skill.effect === 'burn' ? 3 : skill.effect === 'poison' ? 3 : skill.effect === 'bleed' ? 2 : 2;
          target.debuffs.push({ type: skill.effect, turns });
          if (FUNNY[skill.effect]) addLog(pickRandom(FUNNY[skill.effect]), 'funny');
        }
      }
    }
  }

  /* Lifesteal */
  if (skill.effect === 'lifesteal') {
    const healAmt = Math.round(damage * 0.5);
    attacker.currentHp = Math.min(attacker.maxHp, attacker.currentHp + healAmt);
    addLog(`${attacker.char.name} ขโมยชีวิต +${healAmt} HP`, 'system');
    showDamageNumber(1 - targetIndex, healAmt, 'heal');
  }
}

/* ============================================================
   ส่วนที่ 18: Animation ถูกตี
   - เพิ่ม class hit-anim ให้ตัวละคร
   - หายไปเองหลัง 0.5 วินาที
   ============================================================ */
function triggerHitAnim(playerIndex) {
  const el = document.getElementById(`${playerIndex===0?'p1':'p2'}-char`);
  el.classList.remove('hit-anim');
  void el.offsetWidth; // force reflow เพื่อ restart animation
  el.classList.add('hit-anim');
  setTimeout(() => el.classList.remove('hit-anim'), 500);
}

/* ============================================================
   ส่วนที่ 19: แสดงเลขดาเมจลอยขึ้น (Floating Damage Number)
   - สร้าง div วางบนตัวละครเป้าหมาย
   - มี class ตามประเภท: normal, crit, heal, miss, ult-dmg
   - ลอยขึ้นและจางหาย
   ============================================================ */
function showDamageNumber(playerIndex, value, type) {
  const charEl = document.getElementById(`${playerIndex===0?'p1':'p2'}-char`);
  const rect = charEl.getBoundingClientRect();
  const num = document.createElement('div');
  num.className = `damage-num ${type}`;
  if (type === 'heal') {
    num.textContent = `+${value}`;
  } else if (type === 'miss') {
    num.textContent = 'MISS!';
  } else {
    num.textContent = `-${value}`;
  }
  num.style.left = (rect.left + rect.width/2 - 30 + (Math.random()-0.5)*40) + 'px';
  num.style.top = (rect.top + 10) + 'px';
  num.style.position = 'fixed';
  document.body.appendChild(num);
  setTimeout(() => num.remove(), 1300);
}

/* ============================================================
   ส่วนที่ 20: จบเทิร์น (End Turn)
   - สลับเทิร์นไปผู้เล่นอีกคน
   - เรียก startTurn() ของเทิร์นใหม่
   ============================================================ */
function endTurn() {
  state.currentTurn = 1 - state.currentTurn;
  updateUI();
  setTimeout(() => startTurn(), 300);
}

/* ============================================================
   ส่วนที่ 21: จบเกม (End Game)
   - แสดง animation ตาย
   - แสดงหน้าจอผล
   - คอนเฟตติถ้าชนะ
   ============================================================ */
function endGame(winnerIndex) {
  const loserIndex = 1 - winnerIndex;
  const loser = state.players[loserIndex];
  const winner = state.players[winnerIndex];

  playSound('death');

  /* Animation ตาย */
  const loserEl = document.getElementById(`${loserIndex===0?'p1':'p2'}-char`);
  loserEl.classList.add('death-anim');

  addLog(`${loser.char.name} ล้มลงแล้ว!`, 'system');
  addLog(pickRandom(FUNNY.death), 'funny');

  setTimeout(() => {
    const winnerLabel = winnerIndex === 0 ? 'ผู้เล่น 1' : 'ผู้เล่น 2';
    document.getElementById('result-title').textContent = `${winnerLabel} ชนะ!`;
    document.getElementById('result-title').className = 'result-title result-winner';
    document.getElementById('result-name').textContent = `${winner.char.name} "${winner.char.title}"`;
    document.getElementById('result-detail').textContent =
      `เหลือ HP ${winner.currentHp}/${winner.maxHp} | ใช้ไป ${state.turnCount} เทิร์น`;
    showScreen('screen-result');
    spawnConfetti();
  }, 1500);
}

/* ============================================================
   ส่วนที่ 22: คอนเฟตติฉลองชัยชนะ
   - สร้าง div เล็กๆ หลายสีตกลงมา
   ============================================================ */
function spawnConfetti() {
  const colors = ['#ff4400','#00bbff','#ffcc00','#00cc44','#aa44ff','#ff4466','#ffffff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.width = (5 + Math.random()*10) + 'px';
      c.style.height = (5 + Math.random()*10) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.animationDuration = (2 + Math.random()*2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 50);
  }
}

/* ============================================================
   ส่วนที่ 23: อัปเดต UI ทั้งหมด (Update UI)
   - HP bar พร้อมเปลี่ยนสี (เขียว→เหลือง→แดง)
   - Ult charge bar
   - Status effect icons
   - Turn indicator
   ============================================================ */
function updateUI() {
  ['p1','p2'].forEach((prefix, i) => {
    const p = state.players[i];
    if (!p) return;

    /* HP */
    const hpPct = Math.max(0, (p.currentHp / p.maxHp) * 100);
    document.getElementById(`${prefix}-hp-text`).textContent = `${Math.max(0,p.currentHp)}/${p.maxHp}`;
    document.getElementById(`${prefix}-hp-pct`).textContent = `${Math.round(hpPct)}%`;
    const hpBar = document.getElementById(`${prefix}-hp-bar`);
    hpBar.style.width = hpPct + '%';
    /* เปลี่ยนสีตาม HP ที่เหลือ */
    if (hpPct > 50) {
      hpBar.style.background = 'linear-gradient(90deg,#00cc44,#44ff88)';
    } else if (hpPct > 25) {
      hpBar.style.background = 'linear-gradient(90deg,#ccaa00,#ffcc44)';
    } else {
      hpBar.style.background = 'linear-gradient(90deg,#cc0000,#ff4444)';
    }

    /* Ult charge */
    document.getElementById(`${prefix}-ult-bar`).style.width = p.ultCharge + '%';
    document.getElementById(`${prefix}-ult-bar`).style.background =
      `linear-gradient(90deg, ${p.char.colorDark}, ${p.char.color})`;
    document.getElementById(`${prefix}-ult-label`).textContent =
      p.ultCharge >= 100 ? 'อัลติเมทพร้อมใช้!' : `อัลติเมท ${p.ultCharge}%`;
    if (p.ultCharge >= 100) {
      document.getElementById(`${prefix}-ult-label`).style.color = 'var(--accent)';
      document.getElementById(`${prefix}-ult-label`).style.fontWeight = '700';
    } else {
      document.getElementById(`${prefix}-ult-label`).style.color = 'var(--muted)';
      document.getElementById(`${prefix}-ult-label`).style.fontWeight = '400';
    }

    /* Status icons */
    const statusEl = document.getElementById(`${prefix}-status`);
    statusEl.innerHTML = '';
    const statusConfig = {
      burn:    { icon:'fa-fire',      bg:'#ff4400', label:'เผา' },
      freeze:  { icon:'fa-snowflake', bg:'#00bbff', label:'แช่แข็ง' },
      stun:    { icon:'fa-bolt',      bg:'#ffcc00', label:'มึน' },
      poison:  { icon:'fa-skull-crossbones', bg:'#00cc44', label:'พิษ' },
      bleed:   { icon:'fa-droplet',   bg:'#cc0000', label:'เลือดไหล' },
      slow:    { icon:'fa-snail',     bg:'#888888', label:'ช้า' },
      root:    { icon:'fa-tree',      bg:'#8B4513', label:'ติดผูก' },
      buffDef: { icon:'fa-shield',    bg:'#4488ff', label:'DEF+' },
      buffSpd: { icon:'fa-forward',   bg:'#ffcc00', label:'SPD+' }
    };
    [...p.buffs, ...p.debuffs].forEach(e => {
      const cfg = statusConfig[e.type];
      if (!cfg) return;
      const icon = document.createElement('div');
      icon.className = 'status-icon';
      icon.style.background = cfg.bg;
      icon.title = `${cfg.label} (${e.turns} เทิร์น)`;
      icon.innerHTML = `<i class="fas ${cfg.icon}"></i><span class="turns-left">${e.turns}</span>`;
      statusEl.appendChild(icon);
    });
    if (p.isHidden) {
      const icon = document.createElement('div');
      icon.className = 'status-icon';
      icon.style.background = '#aa44ff';
      icon.title = 'ล่องหน';
      icon.innerHTML = '<i class="fas fa-eye-slash"></i>';
      statusEl.appendChild(icon);
    }
  });

  /* Turn indicator */
  const ti = state.currentTurn;
  const turnLabel = ti === 0 ? 'ผู้เล่น 1' : 'ผู้เล่น 2';
  const turnName = state.players[ti] ? state.players[ti].char.name : '';
  const turnColor = ti === 0 ? '#00aaff' : '#ff4466';
  document.getElementById('turn-indicator').innerHTML =
    `<span style="color:${turnColor}">${turnLabel}</span><br><span style="font-size:0.75rem">${turnName}</span>`;
}

/* ============================================================
   ส่วนที่ 24: เพิ่มข้อความในบันทึกการต่อสู้
   - รองรับ class: p1, p2, system, funny
   - บันทึกใหม่จะอยู่ด้านล่างสุด
   - auto scroll ลงไป
   ============================================================ */
function addLog(text, type = 'system') {
  const log = document.getElementById('battle-log');
  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  entry.textContent = text;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

/* ============================================================
   ส่วนที่ 25: ฟังก์ชันช่วยเหลือต่างๆ
   ============================================================ */

/* สุ่มเลือก 1 จาก array */
function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/* ดึงตำแหน่งกลางของตัวละครในสนาม (สำหรับวาดเอฟเฟค) */
function getCharPos(playerIndex) {
  const el = document.getElementById(`${playerIndex===0?'p1':'p2'}-char`);
  const rect = el.getBoundingClientRect();
  return [rect.left + rect.width/2, rect.top + rect.height/2];
}

/* เริ่มเกมใหม่ */
function restartGame() {
  showScreen('screen-title');
}

/* ============================================================
   ส่วนที่ 26: เริ่มต้นระบบ
   - เริ่ม fx system
   - แสดงหน้าจอชื่อเกม
   ============================================================ */
fx.init();
showScreen('screen-title');
</script>
